name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DB_HOST: localhost
      RAILS_ENV: test
      SECRET_KEY_BASE: ci-secret-key-base
      KEKA_API_KEY_ENCRYPTION_KEY: ci-keka-encryption-key
      DEVISE_JWT_SECRET_KEY: ci-devise-jwt-secret
      ACTIVE_STORAGE_SERVICE: local
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: yarn

      - name: Install JavaScript dependencies
        run: yarn install --frozen-lockfile

      - name: Prepare database
        run: bin/rails db:prepare

      - name: Run Rails tests
        run: bin/rails test

      - name: Run Vitest
        run: yarn test

      - name: Build Vite production assets
        env:
          RAILS_ENV: production
        run: bin/vite build

      - name: Precompile Rails assets
        env:
          RAILS_ENV: production
        run: bin/rails assets:precompile

      - name: Run Brakeman
        run: bundle exec brakeman --no-pager --quiet -i config/brakeman.ignore

      - name: Audit Ruby dependencies
        run: bundle exec bundler-audit check --update
